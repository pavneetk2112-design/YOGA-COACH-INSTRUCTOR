<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yoga Coach Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #a8edea, #fed6e3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
      width: 300px;
    }

    h1 {
      color: #2e7d32;
      font-size: 22px;
    }

    p {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🧘 Yoga Coach Assistant</h1>
    <p>Chat with your personal yoga guide</p>
  </div>

  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "6b398c2e-280b-43f0-a8cd-b4ad6f10f588",
      region: "eu-de",
      serviceInstanceID: "2c90c288-4b73-4e39-8297-ad10bc4253c4",
      onLoad: async (instance) => { await instance.render(); }
    };

    setTimeout(function () {
      const t = document.createElement('script');
      t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
        (window.watsonAssistantChatOptions.clientVersion || 'latest') +
        "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>
