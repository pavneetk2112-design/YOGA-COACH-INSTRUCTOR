<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Coach Pro</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
:root{
  --white:#ffffff;
  --pink:#ff6f91;
  --peach:#ffb7a5;
  --blue:#6ec6ff;
  --soft:#f8f9fa;
}

body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,var(--white),var(--peach),var(--blue));
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:linear-gradient(90deg,var(--pink),var(--blue));
  color:white;
}

.nav-links{display:flex;}
.nav-links a{margin:0 10px;color:white;cursor:pointer;font-weight:bold;}
.menu-toggle{display:none;font-size:22px;cursor:pointer;}

@media(max-width:768px){
.nav-links{display:none;flex-direction:column;position:absolute;top:60px;right:0;background:var(--pink);width:200px;}
.nav-links.active{display:flex;}
.menu-toggle{display:block;}
}

.section{display:none;padding:20px;} 
.active{display:block;}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.card{
  background:var(--white);
  width:240px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
  padding:15px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  background:linear-gradient(90deg,var(--pink),var(--blue));
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

input{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:1px solid #ddd;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.notify{
  background:linear-gradient(90deg,var(--peach),var(--pink));
  padding:10px;
  border-radius:12px;
  color:white;
  margin:5px;
}

h1,h2,h3{
  color:#333;
}

</style>
</head>

<body>

<div class="navbar">
<h2>🧘 Yoga Coach Pro</h2>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<div class="nav-links" id="navLinks">
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('login')">Login</a>
<a onclick="showSection('premium')">Premium</a>
<a onclick="showSection('dashboard')">Dashboard</a>
</div>
</div>

<div id="home" class="section active">
<h1 align="center">Welcome to Smart Yoga App</h1>
<p align="center">Soft • Aesthetic • Calm UI 🌸</p>
</div>

<div id="login" class="section">
<h2>Login / Signup</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="authMsg"></p>
</div>

<div id="premium" class="section">
<h2>Premium ₹4500</h2>
<p>UPI: 6283092228@fam</p>
<input type="file" id="proof"><br>
<button onclick="uploadProof()">Upload</button>
<p id="proofMsg"></p>
</div>

<div id="dashboard" class="section">
<h2>User Dashboard</h2>

<div class="dashboard">
<div class="card"><h3>🚶 Steps</h3><p id="steps">0</p></div>
<div class="card"><h3>💧 Water</h3><p id="water">0 L</p></div>
<div class="card"><h3>🔥 Calories</h3><p id="calories">0</p></div>
<div class="card"><h3>🧘 Yoga</h3><p id="yoga">No</p></div>
</div>

<h3>Notifications</h3>
<div id="notifications"></div>

<button onclick="simulateData()">Simulate Activity</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const storage = firebase.storage();

function signup(){auth.createUserWithEmailAndPassword(email.value,password.value).then(()=>authMsg.innerText='Signup success').catch(e=>authMsg.innerText=e.message);}
function login(){auth.signInWithEmailAndPassword(email.value,password.value).then(()=>authMsg.innerText='Login success').catch(e=>authMsg.innerText=e.message);}

function uploadProof(){
let file=proof.files[0];
let ref=storage.ref('payments/'+file.name);
ref.put(file).then(()=>proofMsg.innerText='Uploaded');
}

function simulateData(){
let steps=Math.floor(Math.random()*10000);
let water=(Math.random()*3).toFixed(1);
let calories=Math.floor(Math.random()*2000);

stepsEl=document.getElementById('steps');
waterEl=document.getElementById('water');
calEl=document.getElementById('calories');
yogaEl=document.getElementById('yoga');

stepsEl.innerText=steps;
waterEl.innerText=water+' L';
calEl.innerText=calories;
yogaEl.innerText='Done';

let div=document.createElement('div');
div.className='notify';
div.innerText='Reminder: Stay active & hydrated 💖';
document.getElementById('notifications').appendChild(div);
}

function showSection(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toggleMenu(){navLinks.classList.toggle('active');}
</script>

</body>
</html>
